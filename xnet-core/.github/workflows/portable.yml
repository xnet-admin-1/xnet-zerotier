name: Build Portable World Server

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-22.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Build in Alpine container (musl static)
        run: |
          docker run --rm -v $PWD:/src -w /src alpine:3.21 sh -c '
            apk add --no-cache build-base linux-headers
            make portable -j$(nproc)
          '

      - name: Verify binary
        run: |
          file zerotier-portable
          ./zerotier-portable -v
          ldd zerotier-portable 2>&1 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotier-portable-linux-${{ matrix.arch }}
          path: zerotier-portable

  release:
    needs: [build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mv artifacts/zerotier-portable-linux-amd64/zerotier-portable zerotier-portable-linux-amd64
          mv artifacts/zerotier-portable-linux-arm64/zerotier-portable zerotier-portable-linux-arm64
          chmod +x zerotier-portable-*

      - name: Generate checksums
        run: |
          sha256sum zerotier-portable-linux-* > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zerotier-portable-linux-amd64
            zerotier-portable-linux-arm64
            SHA256SUMS
          generate_release_notes: true
